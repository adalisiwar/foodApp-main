---\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: fooddelivery\n---\napiVersion: v1\nkind: Secret\nmetadata:\n  name: postgres-secret\n  namespace: fooddelivery\ntype: Opaque\ndata:\n  POSTGRES_USER: cG9zdGdyZXM=\n  POSTGRES_PASSWORD: cxlyaW5lMTI1NHh4eQ==\n  POSTGRES_DB: Zm9vZGZlbGl2ZXJ5\n---\napiVersion: v1\nkind: Secret\nmetadata:\n  name: jwt-secret\n  namespace: fooddelivery\ntype: Opaque\ndata:\n  JWT_SECRET: eW91cl9qd3Rfc2VjcmV0\n---\napiVersion: v1\nkind: Secret\nmetadata:\n  name: pgadmin-secret\n  namespace: fooddelivery\ntype: Opaque\ndata:\n  PGADMIN_DEFAULT_EMAIL: YWRtaW5AZm9vZGZlbGl2ZXJ5LmNvbQ==\n  PGADMIN_DEFAULT_PASSWORD: YWRtaW4=\n---\napiVersion: apps/v1\nkind: StatefulSet\nmetadata:\n  name: postgres\n  namespace: fooddelivery\nspec:\n  serviceName: postgres\n  replicas: 1\n  selector:\n    matchLabels:\n      app: postgres\n  template:\n    metadata:\n      labels:\n        app: postgres\n    spec:\n      containers:\n      - name: postgres\n        image: postgres:15-alpine\n        ports:\n        - containerPort: 5432\n        envFrom:\n        - secretRef:\n            name: postgres-secret\n        volumeMounts:\n        - name: postgres-storage\n          mountPath: /var/lib/postgresql/data\n        readinessProbe:\n          exec:\n            command:\n            - pg_isready\n            - -U\n            - postgres\n          initialDelaySeconds: 5\n          periodSeconds: 10\n  volumeClaimTemplates:\n  - metadata:\n      name: postgres-storage\n    spec:\n      accessModes:\n      - ReadWriteOnce\n      resources:\n        requests:\n          storage: 5Gi\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: postgres\n  namespace: fooddelivery\nspec:\n  ports:\n  - port: 5432\n    targetPort: 5432\n  clusterIP: None\n  selector:\n    app: postgres\n---\napiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: eureka-server\n  namespace: fooddelivery\nspec:\n  replicas: 1\n  selector:\n    matchLabels:\n      app: eureka-server\n  template:\n    metadata:\n      labels:\n        app: eureka-server\n    spec:\n      containers:\n      - name: eureka-server\n        image: ghcr.io/adalisiwar/eureka-server:latest\n        ports:\n        - containerPort: 8761\n        env:\n        - name: SPRING_PROFILES_ACTIVE\n          value: docker\n        - name: SERVER_PORT\n          value: \"8761\"\n        resources:\n          requests:\n            memory: \"256Mi\"\n            cpu: \"250m\"\n          limits:\n            memory: \"512Mi\"\n            cpu: \"500m\"\n        readinessProbe:\n          httpGet:\n            path: /actuator/health\n            port: 8761\n          initialDelaySeconds: 30\n          periodSeconds: 10\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: eureka-server\n  namespace: fooddelivery\nspec:\n  type: NodePort\n  selector:\n    app: eureka-server\n  ports:\n  - port: 8761\n    targetPort: 8761\n    nodePort: 30061\n
