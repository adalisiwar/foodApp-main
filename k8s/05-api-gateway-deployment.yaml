apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: fooddelivery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: fooddelivery/api-gateway:host18080
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: docker
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        envFrom:
        - secretRef:
            name: jwt-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 9000
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: fooddelivery
  labels:
    monitoring: enabled
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "9000"
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
  - name: http
    port: 9000
    targetPort: 9000
    nodePort: 30090

