apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: fooddelivery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: fooddelivery/order-service:monitoring
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8085
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/fooddelivery"
        envFrom:
        - secretRef:
            name: postgres-secret
        - secretRef:
            name: jwt-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8085
          initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: fooddelivery
  labels:
    monitoring: enabled
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8085"
spec:
  selector:
    app: order-service
  ports:
  - name: http
    port: 8085
    targetPort: 8085

