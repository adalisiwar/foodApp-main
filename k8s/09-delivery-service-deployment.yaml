apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: fooddelivery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
      - name: delivery-service
        image: fooddelivery/delivery-service:monitoring
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8083
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/fooddelivery"
        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8083
          initialDelaySeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: fooddelivery
  labels:
    monitoring: enabled
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /actuator/prometheus
    prometheus.io/port: "8083"
spec:
  selector:
    app: delivery-service
  ports:
  - name: http
    port: 8083
    targetPort: 8083

