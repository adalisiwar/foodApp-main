apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: fooddelivery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
      - name: admin-service
        image: ghcr.io/adalisiwar/admin-service:latest
        ports:
        - containerPort: 8089
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "docker"
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          value: "http://eureka-server:8761/eureka"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/fooddelivery"
        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: fooddelivery
spec:
  selector:
    app: admin-service
  ports:
  - port: 8089
    targetPort: 8089

