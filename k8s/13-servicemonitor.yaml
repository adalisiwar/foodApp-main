apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fooddelivery-services
  namespace: fooddelivery
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - fooddelivery
  selector:
    matchLabels:
      monitoring: enabled
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
